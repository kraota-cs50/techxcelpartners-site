
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <style>
    .indigo { fill: #3f51b5; }
    .gold { fill: #ffd700; }
    .text { font: bold 32px sans-serif; }
    .subtitle { font: bold 18px sans-serif; }
  </style>
  <!-- Abstract geometric "T" -->
  <polygon class="indigo" points="250,10 300,70 270,70 270,110 230,110 230,70 200,70" />
  <polygon class="gold" points="250,110 280,150 220,150" />
  <!-- Company name -->
  <text x="160" y="90" class="text indigo">TECHXCEL</text>
  <text x="320" y="90" class="subtitle gold">PARTNERS</text>
</svg>
